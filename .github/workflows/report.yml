name: devin-report

on:
  schedule:
    - cron: "0 18 * * *"  # daily 18:00 UTC
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build remediation report
        env:
          DEVIN_SERVICE_API_KEY: ${{ secrets.DEVIN_SERVICE_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONPATH: scripts
        run: python scripts/report.py
      - uses: actions/upload-artifact@v4
        with:
          name: remediation-report
          path: REPORT.md
